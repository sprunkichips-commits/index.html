<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0F110E" />
<!-- CSP: только собственные ассеты + Telegram SDK; внешняя сеть запрещена (connect-src 'self').
     script-src строгий ('self', без 'unsafe-inline'); style-src 'unsafe-inline' нужен для инлайн-стилей
     Radix/Recharts. frame-ancestors намеренно не задан — чтобы не сломать встраивание в Telegram. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'" />
<title>Money — personal tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
