<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0E1014" />
<title>Деньги — личный учёт</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root[data-theme="dark"]{--bg:#0E1014;--card:#171A1F;--ink:#EDEFF2;--sub:#9BA1AB;--faint:#646A73;--line:#272B32;--green:#2DBE8E;--red:#F0786C;--violet:#8E8EEA;--amber:#E2A53C;--amberS:#2A2316;--input:#1F232A;--shadow:0 1px 2px rgba(0,0,0,.4);--shadowHover:0 8px 24px rgba(0,0,0,.45);--ov:rgba(0,0,0,.6);--greenT:rgba(45,190,142,.14);--redT:rgba(240,120,108,.14);--violetT:rgba(142,142,234,.14);--amberT:rgba(226,165,60,.14)}
:root[data-theme="light"]{--bg:#F3F4F6;--card:#FFFFFF;--ink:#15181B;--sub:#6B7280;--faint:#9CA3AF;--line:#E7E9EC;--green:#0B9A6D;--red:#E1574C;--violet:#6C6CD1;--amber:#D9982F;--amberS:#FAF2E1;--input:#FFFFFF;--shadow:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05);--shadowHover:0 10px 28px rgba(16,24,40,.12),0 2px 6px rgba(16,24,40,.06);--ov:rgba(17,24,28,.45);--greenT:rgba(11,154,109,.14);--redT:rgba(225,87,76,.14);--violetT:rgba(108,108,209,.14);--amberT:rgba(217,152,47,.14)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg)}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;transition:background-color .2s ease,color .2s ease}
.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.nowrap{white-space:nowrap}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;transition:background-color .15s ease,color .15s ease,border-color .15s ease,transform .12s ease}
button:active{transform:scale(.97)}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

.wrap{max-width:1180px;margin:0 auto;display:flex}
.sidebar{display:none}
.main{flex:1;min-width:0;padding:20px 16px 90px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);transition:background-color .2s ease,border-color .2s ease,box-shadow .15s ease,transform .15s ease}
.p16{padding:16px}.p20{padding:20px}

.header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:20px}
.msel{display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:4px;flex:none}
.mlabel{min-width:112px;text-align:center;font-size:14px;font-weight:600;text-transform:capitalize;overflow:hidden;text-overflow:ellipsis}
.icon-btn{padding:6px;border-radius:9px;color:var(--sub);display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px}
.icon-btn:hover{background:var(--bg);color:var(--ink)}
.add-btn{display:flex;align-items:center;gap:6px;background:var(--violet);color:#fff;font-size:14px;font-weight:600;border-radius:12px;padding:10px 14px;min-height:44px;transition:background-color .15s ease,transform .12s ease}
.add-btn .t{display:none}
.add-btn:hover{filter:brightness(.92)}
.add-btn:active{transform:scale(.96)}

.col{display:flex;flex-direction:column;gap:16px}
.hero-top{display:flex;flex-direction:column;gap:16px}
.hero-net{margin-top:4px;font-size:26px;font-weight:700;white-space:nowrap}
.hero-stats{display:flex;gap:16px}
.stat{display:flex;align-items:center;gap:10px;min-width:0}
.stat-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.stat .v{font-size:15px;font-weight:600;white-space:nowrap}
.bar{margin-top:18px;display:flex;height:10px;border-radius:99px;overflow:hidden;background:var(--bg)}

.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.kpi .k-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.kpi .k-val{margin-top:6px;font-size:19px;font-weight:700;white-space:nowrap}
.kpi .k-sub{margin-top:6px;font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.charts2{display:grid;grid-template-columns:1fr;gap:16px}
.chead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ctitle{font-size:14px;font-weight:600}
.legend{display:flex;gap:12px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}
.dot{width:8px;height:8px;border-radius:99px;display:inline-block}
svg.chart{display:block;width:100%}

.catbars{display:flex;flex-direction:column;gap:10px}
.catrow .cth{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.catname{font-size:12.5px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.catval{font-size:12.5px;font-weight:600;white-space:nowrap}
.cattrack{height:8px;border-radius:99px;overflow:hidden;background:var(--bg)}
.catfill{height:100%;border-radius:99px}
.empty{padding:36px 12px;text-align:center;color:var(--faint);font-size:13px}

.linkbtn{font-size:12px;font-weight:500;color:var(--violet);padding:10px 2px;margin:-10px -2px}
.linkbtn:hover{opacity:.8}
.txrow{display:flex;align-items:center;gap:12px;padding:10px 0}
.tx-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none}
.tx-main{min-width:0;flex:1}
.tx-cat{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-sub{font-size:12px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-amt{font-size:14px;font-weight:600;white-space:nowrap}
.tx-del{flex:none;padding:6px;border-radius:9px;color:var(--faint);display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px}
.tx-del:hover{background:var(--redT);color:var(--red)}
.bt{border-top:1px solid var(--line)}
.txg-head{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)}
.txg-d{font-size:12px;font-weight:600;text-transform:capitalize;color:var(--sub)}
.txg-s{font-size:12px;font-weight:600;white-space:nowrap}

.filters{display:flex;gap:6px}
.chip{border-radius:99px;padding:6px 16px;font-size:13px;font-weight:600;background:var(--card);color:var(--sub);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;min-height:44px}
.chip.active{color:#fff;border-color:transparent}
.chip:not(.active):hover{border-color:var(--sub);color:var(--ink)}

.invrow{display:flex;align-items:center;gap:12px;padding:12px 0}
.inv-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none;background:var(--amberS);color:var(--amber)}

.bottom{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;background:var(--card);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 0;min-height:44px;color:var(--faint)}
.tabbtn.active{color:var(--ink)}
.tabbtn .t{font-size:10.5px;font-weight:500}

.overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:var(--ov)}
.sheet{width:100%;background:var(--card);border:1px solid var(--line);border-radius:18px 18px 0 0;box-shadow:var(--shadow);padding:20px;max-height:92vh;overflow-y:auto}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-title{font-size:17px;font-weight:700}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:16px}
.seg-btn{border-radius:9px;padding:8px 0;font-size:14px;font-weight:600;color:var(--sub);display:flex;align-items:center;justify-content:center;min-height:44px}
.seg-btn.active{background:var(--card);box-shadow:var(--shadow)}
.seg-btn:not(.active):hover{color:var(--ink)}
.field{margin-bottom:12px}
.flabel{display:block;margin-bottom:5px;font-size:12px;font-weight:500;color:var(--sub)}
.input,.select,.textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:16px;color:var(--ink);outline:none;background:var(--input)}
.textarea{font-size:12px;resize:vertical}
.amount-wrap{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:6px 12px;background:var(--input)}
.amount-big{border:none;outline:none;width:100%;font-size:22px;font-weight:700;background:transparent;color:var(--accent);font-variant-numeric:tabular-nums}
.cur{font-size:18px;font-weight:600;color:var(--faint)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;padding:13px 0;font-size:14px;font-weight:600;min-height:44px}
.btn.sm{padding:10px 0;font-size:13px;border-radius:11px;min-height:44px}
.btn.primary{background:var(--accent,var(--violet));color:#fff}
.btn.ink{background:var(--ink);color:var(--card)}
.btn.ghost{background:var(--bg);color:var(--sub)}
.btn.violet{background:var(--violet);color:#fff}
.btn.danger{background:rgba(240,120,108,.16);color:var(--red)}
.btn[disabled]{opacity:.5;pointer-events:none}
.btn:not([disabled]):hover{filter:brightness(.95)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.section-cap{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);margin-bottom:8px}
.hr{height:1px;background:var(--line);margin:20px 0}
.note{font-size:12.5px;color:var(--sub);margin-bottom:12px}

.toast{position:fixed;left:0;right:0;bottom:80px;z-index:60;display:flex;justify-content:center;padding:0 16px;pointer-events:none}
.toast > div{background:var(--ink);color:var(--card);border-radius:12px;padding:10px 16px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.3)}

@media(min-width:768px){
  .sidebar{display:flex;flex-direction:column;width:224px;flex:none;position:sticky;top:0;height:100vh;background:var(--card);border-right:1px solid var(--line);padding:20px 16px}
  .main{padding:28px 32px 40px}
  .bottom{display:none}
  .col{gap:20px}
  .charts2{grid-template-columns:1fr 1fr;gap:20px}
  .add-btn .t{display:inline}
  .overlay{align-items:center}
  .sheet{max-width:430px;border-radius:18px}
  .toast{bottom:24px}
  .card:hover{box-shadow:var(--shadowHover);transform:translateY(-1px)}
  .msel:hover,.add-btn:hover{box-shadow:var(--shadowHover)}
}
@media(min-width:1024px){ .kpis{grid-template-columns:repeat(3,1fr)} }
.brand{display:flex;align-items:center;gap:10px;padding:0 4px;margin-bottom:28px}
.brand-ico{width:36px;height:36px;border-radius:11px;background:var(--violet);display:flex;align-items:center;justify-content:center}
.brand-t{font-size:15px;font-weight:700}.brand-s{font-size:11px;color:var(--faint)}
.nav{display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;border-radius:12px;padding:10px 12px;font-size:14px;font-weight:500;color:var(--sub)}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:var(--bg);color:var(--ink);box-shadow:inset 3px 0 0 var(--violet)}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:4px}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
"use strict";
var KEY="pm-finance-v1", TKEY="pm-finance-theme-v1";
/* ===== Telegram Mini App ===== */
var TG=(window.Telegram&&window.Telegram.WebApp)?window.Telegram.WebApp:null;
var OWNER_ID=0; /* впиши сюда свой Telegram ID (число), чтобы приложение открывалось только у тебя. 0 = без замка; данные у каждого пользователя всё равно свои */
var hasCloud=!!(TG&&TG.initData&&TG.CloudStorage);
var tgUserId=null, CHUNK=3500, prevN={};
function cloudGet(k){return new Promise(function(res){try{TG.CloudStorage.getItem(k,function(e,v){res(e?null:(v||null));});}catch(_){res(null);}});}
function cloudSet(k,v){return new Promise(function(res){try{TG.CloudStorage.setItem(k,v,function(e,ok){res(!e&&!!ok);});}catch(_){res(false);}});}
function cloudRem(ks){return new Promise(function(res){try{TG.CloudStorage.removeItems(ks,function(e,ok){res(!e&&!!ok);});}catch(_){res(false);}});}
function bigSet(name,str){var n=Math.max(1,Math.ceil(str.length/CHUNK)),ops=[],i;for(i=0;i<n;i++)ops.push(cloudSet(name+"_"+i,str.slice(i*CHUNK,(i+1)*CHUNK)));return Promise.all(ops).then(function(){return cloudSet(name+"_n",String(n));}).then(function(){var pn=prevN[name]||0;if(pn>n){var rm=[],j;for(j=n;j<pn;j++)rm.push(name+"_"+j);if(rm.length)return cloudRem(rm);}}).then(function(){prevN[name]=n;});}
function bigGet(name){return cloudGet(name+"_n").then(function(ns){if(ns==null)return null;var n=parseInt(ns)||0,arr=[],i;for(i=0;i<n;i++)arr.push(cloudGet(name+"_"+i));return Promise.all(arr).then(function(parts){for(var j=0;j<parts.length;j++)if(parts[j]==null)return null;prevN[name]=n;return parts.join("");});});}
var INCOME=["YouTube","Реклама","Офлайн-работа","Близкие","Прочий доход"];
var EXPENSE=["Жильё","Продукты","Кафе и рестораны","Транспорт","Интернет и связь","Подписки и сервисы","Оборудование","Софт и инструменты","Реклама и продвижение","Здоровье","Развлечения","Подарки","Одежда","Налоги","Прочие расходы"];
var COL={"Жильё":"#E1574C","Продукты":"#E58A3B","Кафе и рестораны":"#E0B23A","Транспорт":"#7FB069","Интернет и связь":"#3FA796","Подписки и сервисы":"#4F86C6","Оборудование":"#6C6CD1","Софт и инструменты":"#9B6CCB","Реклама и продвижение":"#C264A0","Здоровье":"#D98AA8","Развлечения":"#8C7B6B","Подарки":"#6B8E9E","Одежда":"#A0A65B","Налоги":"#C77B58","Прочие расходы":"#9AA0A6"};
function cc(c){return COL[c]||"#9AA0A6";}
var MONTHS=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
var MS=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
var TYPES=["Акции","ETF","Облигации","Крипта","Депозит","Недвижимость","Прочее"];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
var DEMO={transactions:[
 {id:uid(),date:"2026-06-01",type:"Доход",category:"Офлайн-работа",amount:120000,note:"Зарплата"},
 {id:uid(),date:"2026-06-05",type:"Доход",category:"YouTube",amount:45000,note:"AdSense"},
 {id:uid(),date:"2026-06-10",type:"Доход",category:"Реклама",amount:80000,note:"Интеграция"},
 {id:uid(),date:"2026-06-03",type:"Расход",category:"Жильё",amount:35000,note:"Аренда"},
 {id:uid(),date:"2026-06-03",type:"Расход",category:"Транспорт",amount:600,note:"Метро"},
 {id:uid(),date:"2026-06-08",type:"Расход",category:"Подписки и сервисы",amount:4500,note:"Adobe"},
 {id:uid(),date:"2026-06-12",type:"Расход",category:"Оборудование",amount:60000,note:"Микрофон"},
 {id:uid(),date:"2026-06-14",type:"Расход",category:"Подарки",amount:5000,note:"ДР друга"},
 {id:uid(),date:"2026-06-22",type:"Расход",category:"Продукты",amount:3100,note:"Магазин"}
],investments:[
 {id:uid(),name:"S&P 500 ETF",type:"ETF",invested:200000,current:230000},
 {id:uid(),name:"Bitcoin",type:"Крипта",invested:100000,current:138000}
]};

/* ---------- storage ---------- */
var mem={};
function sget(k){try{var v=localStorage.getItem(k);return v==null?null:v;}catch(e){return (k in mem)?mem[k]:null;}}
function sset(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
function emptyData(){return{transactions:[],investments:[]};}
function sanitize(o){
 if(!o||!Array.isArray(o.transactions))return null;
 return{
  transactions:o.transactions.filter(function(t){return t&&t.date&&t.type&&t.amount!=null;}).map(function(t){return{id:t.id||uid(),date:t.date,type:t.type==="Доход"?"Доход":"Расход",category:t.category||"Прочие расходы",amount:Number(t.amount)||0,note:t.note||""};}),
  investments:Array.isArray(o.investments)?o.investments.map(function(i){return{id:i.id||uid(),name:i.name||"Актив",type:i.type||"Прочее",invested:Number(i.invested)||0,current:Number(i.current)||0};}):[]
 };
}
function loadData(){var r=sget(KEY);if(!r)return emptyData();try{var p=JSON.parse(r);return(p&&Array.isArray(p.transactions))?p:emptyData();}catch(e){return emptyData();}}

/* ---------- helpers ---------- */
var NF=new Intl.NumberFormat("ru-RU",{maximumFractionDigits:0});
function rub(n){return NF.format(Math.round(n||0))+" ₽";}
function rubS(n){return(n>0?"+":n<0?"−":"")+NF.format(Math.abs(Math.round(n||0)))+" ₽";}
function fmtCompact(n){n=Math.round(n||0);var a=Math.abs(n);if(a>=1000000)return(n/1000000).toFixed(a%1000000?1:0).replace(/\.0$/,"")+"М";if(a>=1000)return Math.round(n/1000)+"к";return String(n);}
function grp(s){var d=(s||"").replace(/\D/g,"");return d?Number(d).toLocaleString("ru-RU"):"";}
function today(){return new Date().toISOString().slice(0,10);}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

/* ---------- state ---------- */
var state={data:loadData(),theme:(sget(TKEY)==="light"?"light":"dark"),tab:"dash",cursor:null,txFilter:"Все",invForm:false};
(function(){var ts=state.data.transactions.slice().sort(function(a,b){return a.date<b.date?1:-1;})[0];var n=new Date();state.cursor=ts?{y:new Date(ts.date+"T00:00:00").getFullYear(),m:new Date(ts.date+"T00:00:00").getMonth()}:{y:n.getFullYear(),m:n.getMonth()};})();
function persist(){sset(KEY,JSON.stringify(state.data));}
function setTheme(t){state.theme=t;document.documentElement.setAttribute("data-theme",t);sset(TKEY,t);}
if(hasCloud){var _persist=persist,_setTheme=setTheme;persist=function(){_persist();bigSet("data",JSON.stringify(state.data));};setTheme=function(t){_setTheme(t);cloudSet("theme",t);};}

/* ---------- derived ---------- */
function compute(){
 var y=state.cursor.y,m=state.cursor.m,tx=state.data.transactions;
 function inM(t){var d=new Date(t.date+"T00:00:00");return d.getFullYear()===y&&d.getMonth()===m;}
 var mt=tx.filter(inM);
 var income=0,expense=0;mt.forEach(function(t){if(t.type==="Доход")income+=t.amount;else expense+=t.amount;});
 var net=income-expense,rate=income>0?net/income*100:0;
 var monthly=MS.map(function(label,mm){var inc=0,exp=0;tx.forEach(function(t){var d=new Date(t.date+"T00:00:00");if(d.getFullYear()===y&&d.getMonth()===mm){if(t.type==="Доход")inc+=t.amount;else exp+=t.amount;}});return{label:label,in:inc,ex:exp};});
 var cm={};mt.forEach(function(t){if(t.type==="Расход")cm[t.category]=(cm[t.category]||0)+t.amount;});
 var byCat=Object.keys(cm).map(function(k){return{name:k,value:cm[k],color:cc(k)};}).sort(function(a,b){return b.value-a.value;});
 var nd=dim(y,m),daily=[],i;for(i=0;i<nd;i++)daily.push({day:i+1,v:0});var adset={},ad=0;
 mt.forEach(function(t){if(t.type==="Расход"){var dd=new Date(t.date+"T00:00:00").getDate();daily[dd-1].v+=t.amount;if(!adset[dd]){adset[dd]=1;ad++;}}});
 var avgDay=ad?expense/ad:0,top=byCat[0]||null;
 var invested=0,current=0;state.data.investments.forEach(function(x){invested+=x.invested||0;current+=x.current||0;});

/* ---------- charts ---------- */
function monthlySVG(data){
 var W=340,H=184,pT=16,pB=30,pL=6,pR=6,plotH=H-pT-pB,plotW=W-pL-pR,max=1,i;
 for(i=0;i<data.length;i++){if(data[i].in>max)max=data[i].in;if(data[i].ex>max)max=data[i].ex;}
 var gW=plotW/12,bW=Math.min(10,gW*0.32),s="";
 [0,0.5,1].forEach(function(f){var yv=pT+plotH-plotH*f;s+="<line x1='"+pL+"' y1='"+yv+"' x2='"+(W-pR)+"' y2='"+yv+"' stroke='var(--line)' stroke-width='1'/>";if(f>0)s+="<text x='"+pL+"' y='"+(yv-3)+"' font-size='7.5' fill='var(--faint)'>"+fmtCompact(max*f)+"</text>";});
 data.forEach(function(d,k){var x0=pL+k*gW,cx=x0+gW/2,ih=d.in/max*plotH,eh=d.ex/max*plotH,yL=pT+plotH+11;
  s+="<rect x='"+(cx-bW-1)+"' y='"+(pT+plotH-ih)+"' width='"+bW+"' height='"+ih+"' rx='2' fill='var(--green)'/>";
  s+="<rect x='"+(cx+1)+"' y='"+(pT+plotH-eh)+"' width='"+bW+"' height='"+eh+"' rx='2' fill='var(--red)'/>";
  s+="<text x='"+cx+"' y='"+yL+"' font-size='8.5' fill='var(--faint)' text-anchor='end' transform='rotate(-40 "+cx+" "+yL+")'>"+d.label+"</text>";
 });
 return "<svg class='chart' viewBox='0 0 "+W+" "+H+"'>"+s+"</svg>";
}
function dailySVG(data){
 var W=340,H=150,pT=14,pB=18,pL=4,pR=4,plotH=H-pT-pB,plotW=W-pL-pR,n=data.length,max=1,i;
 for(i=0;i<n;i++)if(data[i].v>max)max=data[i].v;
 var cw=plotW/n,bW=Math.min(9,cw*0.66),s="";
 s+="<line x1='"+pL+"' y1='"+(pT+plotH)+"' x2='"+(W-pR)+"' y2='"+(pT+plotH)+"' stroke='var(--line)' stroke-width='1'/>";
 s+="<line x1='"+pL+"' y1='"+pT+"' x2='"+(W-pR)+"' y2='"+pT+"' stroke='var(--line)' stroke-width='1' stroke-dasharray='2 2'/>";
 s+="<text x='"+pL+"' y='"+(pT-3)+"' font-size='7.5' fill='var(--faint)'>"+fmtCompact(max)+"</text>";
 data.forEach(function(d,k){var x0=pL+k*cw,cx=x0+cw/2,h=d.v/max*plotH;
  s+="<rect x='"+(cx-bW/2)+"' y='"+(pT+plotH-h)+"' width='"+bW+"' height='"+h+"' rx='2' fill='var(--red)'/>";
  if(k%3===0)s+="<text x='"+cx+"' y='"+(pT+plotH+12)+"' font-size='8' fill='var(--faint)' text-anchor='middle'>"+d.day+"</text>";
 });
 return "<svg class='chart' viewBox='0 0 "+W+" "+H+"'>"+s+"</svg>";
}
function catBars(data){

    ? "<div class='section-cap'>Синхронизация Telegram</div><p class='note'>Данные синхронизируются с твоим Telegram автоматически — видны только тебе и сразу на всех твоих устройствах.<br>Твой ID: <b>"+(tgUserId||"—")+"</b></p>"
    : "<p class='note'>Данные хранятся на этом устройстве. Чтобы перенести на телефон/ПК — скачай копию и загрузи на другом устройстве.</p>")+
  "<div class='section-cap'>Сделать копию</div><div class='row2' style='margin-bottom:20px'>"+
   "<button class='btn sm ink' data-act='set-download'>"+ic("dl",15)+"Скачать файл</button>"+
   "<button class='btn sm ghost' data-act='set-copy'>"+ic("copy",15)+"Скопировать</button></div>"+
  "<div class='section-cap'>Восстановить</div>"+
  "<button class='btn sm ghost' style='width:100%;margin-bottom:8px' data-act='set-upload'>"+ic("ul",15)+"Загрузить файл</button>"+
  "<input id='set-file' type='file' accept='application/json,.json' style='display:none'>"+
  "<textarea id='set-text' class='textarea' rows='3' placeholder='…или вставь скопированный текст сюда'></textarea>"+
  "<button class='btn sm violet' style='width:100%;margin-top:8px' data-act='set-restore'>Восстановить из текста</button>"+
  "<div class='hr'></div><div class='row2'>"+
   "<button class='btn sm ghost' data-act='set-demo'>Заполнить примером</button>"+
   "<button class='btn sm danger' data-act='set-clear'>"+ic("trash",15)+"Очистить всё</button></div></div></div>";
 var d=document.createElement("div");d.innerHTML=html;document.body.appendChild(d.firstChild);
}

/* ---------- toast ---------- */
var toastT=null;
function toast(m){var ex=document.querySelector(".toast");if(ex)ex.remove();var n=document.createElement("div");n.className="toast";n.innerHTML="<div>"+esc(m)+"</div>";document.body.appendChild(n);if(toastT)clearTimeout(toastT);toastT=setTimeout(function(){n.remove();},1900);}

/* ---------- actions ---------- */
function shift(delta){var d=new Date(state.cursor.y,state.cursor.m+delta,1);state.cursor={y:d.getFullYear(),m:d.getMonth()};paint();}
function readNum(id){var el=document.getElementById(id);return el?(parseInt((el.value||"").replace(/\D/g,""))||0):0;}
function val(id){var el=document.getElementById(id);return el?el.value:"";}

function doRestore(obj){var c=sanitize(obj);if(c){state.data=c;persist();closeModal();var ts=state.data.transactions.slice().sort(function(a,b){return a.date<b.date?1:-1;})[0];if(ts){var dd=new Date(ts.date+"T00:00:00");state.cursor={y:dd.getFullYear(),m:dd.getMonth()};}paint();toast("Восстановлено");}else toast("Файл не подходит");}

document.addEventListener("click",function(e){
 var t=e.target.closest("[data-act]");if(!t)return;var a=t.getAttribute("data-act");
 if(a==="tab"){state.tab=t.getAttribute("data-tab");paint();}
 else if(a==="mprev"){shift(-1);}
 else if(a==="mnext"){shift(1);}
 else if(a==="open-add"){openAdd();}
 else if(a==="open-set"){openSettings();}
 else if(a==="open-tx"){state.tab="tx";paint();}
 else if(a==="theme"){setTheme(state.theme==="dark"?"light":"dark");paint();}
 else if(a==="filter"){state.txFilter=t.getAttribute("data-f");paint();}
 else if(a==="del-tx"){var id=t.getAttribute("data-id");state.data.transactions=state.data.transactions.filter(function(x){return x.id!==id;});persist();paint();}
 else if(a==="del-inv"){var iid=t.getAttribute("data-id");state.data.investments=state.data.investments.filter(function(x){return x.id!==iid;});persist();paint();}
 else if(a==="inv-toggle"){state.invForm=!state.invForm;paint();}
 else if(a==="inv-save"){var nm=val("inv-name").trim(),iv=readNum("inv-amt"),cu=readNum("inv-cur"),ty=val("inv-type");if(!nm||iv<=0){toast("Впиши название и сумму");return;}state.data.investments.push({id:uid(),name:nm,type:ty||"Прочее",invested:iv,current:cu});state.invForm=false;persist();paint();toast("Актив добавлен");}
 else if(a==="overlay-close"){if(e.target.classList.contains("overlay"))closeModal();}
 else if(a==="modal-close"){closeModal();}
 else if(a==="add-type"){var ty2=t.getAttribute("data-type"),m=document.getElementById("modal-add");if(!m)return;m.setAttribute("data-type",ty2);m.style.setProperty("--accent",ty2==="Доход"?"var(--green)":"var(--red)");var segs=m.querySelectorAll(".seg-btn");segs.forEach(function(b){b.classList.toggle("active",b.getAttribute("data-type")===ty2);});document.getElementById("add-cat").innerHTML=catOptions(ty2==="Доход"?INCOME:EXPENSE);}
 else if(a==="add-save"){var m2=document.getElementById("modal-add"),type=m2?m2.getAttribute("data-type"):"Расход",amount=readNum("add-amount"),category=val("add-cat"),date=val("add-date"),note=val("add-note").trim();if(!category||amount<=0||!date){toast("Заполни сумму и категорию");return;}state.data.transactions.unshift({id:uid(),date:date,type:type,category:category,amount:amount,note:note});state.cursor={y:new Date(date+"T00:00:00").getFullYear(),m:new Date(date+"T00:00:00").getMonth()};persist();closeModal();paint();toast("Добавлено");}
 else if(a==="set-theme"){var tt=t.getAttribute("data-t");setTheme(tt);var bl=document.getElementById("th-light"),bd=document.getElementById("th-dark");if(bl&&bd){bl.style.background=tt==="light"?"var(--ink)":"var(--bg)";bl.style.color=tt==="light"?"var(--card)":"var(--sub)";bd.style.background=tt==="dark"?"var(--violet)":"var(--bg)";bd.style.color=tt==="dark"?"#fff":"var(--sub)";}paint();}
 else if(a==="set-download"){try{var blob=new Blob([JSON.stringify(state.data,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var ad=document.createElement("a");ad.href=url;ad.download="dengi-backup-"+today()+".json";document.body.appendChild(ad);ad.click();ad.remove();URL.revokeObjectURL(url);toast("Файл скачан");}catch(err){toast("Не удалось скачать");}}
 else if(a==="set-copy"){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(JSON.stringify(state.data)).then(function(){toast("Скопировано");},function(){var tx=document.getElementById("set-text");if(tx)tx.value=JSON.stringify(state.data);toast("Скопируй текст вручную");});}else{var tx2=document.getElementById("set-text");if(tx2)tx2.value=JSON.stringify(state.data);toast("Текст в поле — скопируй");}}
 else if(a==="set-upload"){var f=document.getElementById("set-file");if(f)f.click();}
 else if(a==="set-restore"){var txt=val("set-text");try{doRestore(JSON.parse(txt||"null"));}catch(err){toast("Не получилось прочитать");}}
 else if(a==="set-demo"){doRestore(DEMO);toast("Загружен пример");}
 else if(a==="set-clear"){if(window.confirm("Удалить все операции и инвестиции?")){state.data=emptyData();persist();closeModal();paint();toast("Очищено");}}
});

document.addEventListener("input",function(e){
 var el=e.target;if(el&&el.classList&&el.classList.contains("amount-input")){var d=(el.value||"").replace(/\D/g,"");el.value=d?Number(d).toLocaleString("ru-RU"):"";}
});
document.addEventListener("change",function(e){
 if(e.target&&e.target.id==="set-file"){var f=e.target.files&&e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{doRestore(JSON.parse(r.result));}catch(err){toast("Файл не подходит");}};r.readAsText(f);}
});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});

/* ---------- init ---------- */
document.documentElement.setAttribute("data-theme",state.theme);
var blocked=false,tgUser=null;
if(TG){try{TG.ready();TG.expand();}catch(_){}try{tgUser=(TG.initDataUnsafe&&TG.initDataUnsafe.user)?TG.initDataUnsafe.user:null;}catch(_){}tgUserId=tgUser?tgUser.id:null;}
function tgPaintColors(){if(!TG)return;try{var bg=getComputedStyle(document.documentElement).getPropertyValue("--bg").trim();if(bg){TG.setBackgroundColor&&TG.setBackgroundColor(bg);TG.setHeaderColor&&TG.setHeaderColor(bg);}}catch(_){}}
if(OWNER_ID&&tgUser&&tgUser.id!==OWNER_ID)blocked=true;
if(blocked){document.getElementById("root").innerHTML="<div style='min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;color:var(--sub);font-size:15px;line-height:1.5'>Это личное приложение.<br>Доступ только у владельца.</div>";}
else{
 paint();tgPaintColors();
 if(hasCloud){Promise.all([bigGet("data"),cloudGet("theme")]).then(function(r){
  var dataStr=r[0],th=r[1];
  if((th==="light"||th==="dark")&&th!==state.theme){state.theme=th;document.documentElement.setAttribute("data-theme",th);}
  if(dataStr){try{var p=JSON.parse(dataStr);if(p&&Array.isArray(p.transactions)){state.data=p;sset(KEY,dataStr);var ts=state.data.transactions.slice().sort(function(a,b){return a.date<b.date?1:-1;})[0];if(ts){var dd=new Date(ts.date+"T00:00:00");state.cursor={y:dd.getFullYear(),m:dd.getMonth()};}}}catch(_){}}
  else{if(state.data.transactions.length||state.data.investments.length)bigSet("data",JSON.stringify(state.data));cloudSet("theme",state.theme);}
  paint();tgPaintColors();
 });}
}
})();
</script>
</body>
</html>
