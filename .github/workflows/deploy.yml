name: Deploy to GitHub Pages

# Собирает приложение и публикует dist на GitHub Pages.
# ВАЖНО: деплой реально произойдёт, только когда в настройках репозитория
# Settings → Pages → Source выбрано «GitHub Actions». Пока Source = «Deploy from a
# branch (main)», main продолжает отдавать прежнюю версию, а этот workflow собирает
# артефакт, но шаг deploy не перезапишет сайт. Переключить Source — финальный шаг,
# когда ветка redesign готова (см. README, раздел «Деплой»).

on:
  push:
    branches: [redesign]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
