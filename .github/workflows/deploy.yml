name: Deploy to GitHub Pages

# Собирает приложение и публикует dist на GitHub Pages.
# Требует: Settings → Pages → Source = «GitHub Actions».
# Деплой идёт с ветки main (она разрешена правилом окружения github-pages
# по умолчанию). Чтобы публиковать с другой ветки — добавь её в
# Settings → Environments → github-pages → Deployment branches.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
